version: 1
disable_existing_loggers: false

formatters:
  default:
    class: uvicorn.logging.DefaultFormatter
    format: "%(levelprefix)s %(message)s"
    use_colors: null

handlers:
  default:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stderr

loggers:
  uvicorn.error:
    level: INFO
    handlers: [default]
    propagate: false
  # OAuth callbacks necessarily carry a one-time authorization code in the
  # query string. Do not let the generic HTTP access logger persist it.
  uvicorn.access:
    level: WARNING
    handlers: []
    propagate: false
