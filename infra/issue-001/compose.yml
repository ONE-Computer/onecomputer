name: onecomputer-v4-issue-001

services:
  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_DB: onecomputer
      POSTGRES_USER: onecomputer
      POSTGRES_PASSWORD: ${ONECOMPUTER_POSTGRES_PASSWORD:?set ONECOMPUTER_POSTGRES_PASSWORD}
    networks: [control-private]
    volumes:
      - onecomputer-v4-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onecomputer -d onecomputer"]
      interval: 2s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  workspace-controller:
    build:
      context: ../..
      dockerfile: infra/issue-001/Dockerfile.node
    command: ["npm", "run", "start", "-w", "@onecomputer/workspace-controller"]
    environment:
      CONTROLLER_HOST: 0.0.0.0
      CONTROLLER_PORT: 4101
      CONTROLLER_INTERNAL_TOKEN: ${ONECOMPUTER_CONTROLLER_TOKEN:?set ONECOMPUTER_CONTROLLER_TOKEN}
      SANDBOX_DRIVER: kasm-local
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      KASM_LOCAL_NETWORK: onecomputer-v4-sandbox
      KASM_LOCAL_CONTROL_NETWORK: onecomputer-v4-control
      KASM_LOCAL_IMAGE: kasmweb/ubuntu-jammy-desktop@sha256:58b0710b320b99ab7e352342d7ec3a25b09740c523b75d794c5f7476910da580
      KASM_LOCAL_RELAY_IMAGE: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
      KASM_PUBLIC_HOST: 127.0.0.1
    networks: [control-private]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

  control-api:
    build:
      context: ../..
      dockerfile: infra/issue-001/Dockerfile.node
    command: ["npm", "run", "start", "-w", "@onecomputer/control-api"]
    environment:
      CONTROL_HOST: 0.0.0.0
      CONTROL_PORT: 4100
      WEB_PROXY_TOKEN: ${ONECOMPUTER_WEB_PROXY_TOKEN:?set ONECOMPUTER_WEB_PROXY_TOKEN}
      CONTROLLER_URL: http://workspace-controller:4101
      CONTROLLER_INTERNAL_TOKEN: ${ONECOMPUTER_CONTROLLER_TOKEN:?set ONECOMPUTER_CONTROLLER_TOKEN}
      DATABASE_URL: postgres://onecomputer:${ONECOMPUTER_POSTGRES_PASSWORD}@postgres:5432/onecomputer
    networks: [web-edge, control-private]
    depends_on:
      postgres: { condition: service_healthy }
      workspace-controller: { condition: service_started }
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: infra/issue-001/Dockerfile.node
    command: ["npm", "run", "dev", "-w", "web", "--", "--host", "0.0.0.0", "--port", "4173", "--configLoader", "native"]
    environment:
      ONECOMPUTER_CONTROL_URL: http://control-api:4100
      ONECOMPUTER_WEB_PROXY_TOKEN: ${ONECOMPUTER_WEB_PROXY_TOKEN:?set ONECOMPUTER_WEB_PROXY_TOKEN}
      ONECOMPUTER_DEV_TENANT_ID: acme
      ONECOMPUTER_DEV_SUBJECT_ID: alex-morgan
      ONECOMPUTER_VITE_CACHE_DIR: /tmp/vite
    networks: [web-edge]
    ports: ["127.0.0.1:4174:4173"]
    depends_on: [control-api]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

networks:
  web-edge: {}
  control-private:
    name: onecomputer-v4-control

volumes:
  onecomputer-v4-postgres-data:
    name: onecomputer-v4-postgres-data
