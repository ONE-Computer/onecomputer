name: onecomputer

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onecomputer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onecomputer}
      POSTGRES_DB: ${POSTGRES_DB:-onecomputer}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${ONECOMPUTER_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onecomputer}"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 10
    networks:
      - onecomputer

  onecomputer:
    image: ghcr.io/onecomputer/onecomputer:${ONECOMPUTER_VERSION:-latest}
    container_name: onecomputer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ONECOMPUTER_BIND_HOST:-127.0.0.1}:${ONECOMPUTER_APP_PORT:-10254}:10254"
      - "${ONECOMPUTER_BIND_HOST:-127.0.0.1}:${ONECOMPUTER_GATEWAY_PORT:-10255}:10255"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-onecomputer}:${POSTGRES_PASSWORD:-onecomputer}@postgres:5432/${POSTGRES_DB:-onecomputer}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      APP_URL: http://${ONECOMPUTER_BIND_HOST:-127.0.0.1}:${ONECOMPUTER_APP_PORT:-10254}
      GATEWAY_API_URL: http://${ONECOMPUTER_BIND_HOST:-127.0.0.1}:${ONECOMPUTER_GATEWAY_PORT:-10255}
    volumes:
      - app-data:/app/data
    env_file:
      - path: ../.env
        required: false
    networks:
      - onecomputer

volumes:
  pgdata:
  app-data:

networks:
  onecomputer:
    driver: bridge
