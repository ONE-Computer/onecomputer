name: onecomputer-v4-issue-002

services:
  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_DB: onecomputer
      POSTGRES_USER: onecomputer
      POSTGRES_PASSWORD: ${ONECOMPUTER_POSTGRES_PASSWORD:?set ONECOMPUTER_POSTGRES_PASSWORD}
    networks: [control-private]
    volumes:
      - onecomputer-v4-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onecomputer -d onecomputer"]
      interval: 2s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  litellm-postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${ONECOMPUTER_LITELLM_POSTGRES_PASSWORD:?set ONECOMPUTER_LITELLM_POSTGRES_PASSWORD}
    networks: [gateway-private]
    volumes:
      - onecomputer-v4-litellm-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 2s
      timeout: 2s
      retries: 30
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

  gateway-fixture:
    build:
      context: ../..
      dockerfile: infra/issue-001/Dockerfile.node
    command: ["npm", "run", "start", "-w", "@onecomputer/gateway-fixture"]
    environment:
      FIXTURE_HOST: 0.0.0.0
      FIXTURE_PORT: 4200
    networks: [gateway-private]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4200/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 2s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  litellm:
    container_name: onecomputer-v4-litellm
    image: ghcr.io/berriai/litellm:v1.93.0@sha256:a1745e629abfb17d434426ff48b115f54f4f4c4a0f5af241de569e93c63c411e
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1", "--log_config", "/app/log-config.yaml"]
    environment:
      LITELLM_MASTER_KEY: ${ONECOMPUTER_LITELLM_MASTER_KEY:?set ONECOMPUTER_LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${ONECOMPUTER_LITELLM_SALT_KEY:-${ONECOMPUTER_LITELLM_CREDENTIAL_SECRET:?set ONECOMPUTER_LITELLM_SALT_KEY}}
      DATABASE_URL: postgres://litellm:${ONECOMPUTER_LITELLM_POSTGRES_PASSWORD}@litellm-postgres:5432/litellm
      DISABLE_ADMIN_UI: "false"
      UI_USERNAME: ${ONECOMPUTER_LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${ONECOMPUTER_LITELLM_UI_PASSWORD:-onecomputer-local-admin}
      PROXY_BASE_URL: ${ONECOMPUTER_LITELLM_PUBLIC_URL:-http://localhost:4000}
    networks: [gateway-private, web-edge]
    ports: ["127.0.0.1:4000:4000"]
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
      - ./litellm-log-config.yaml:/app/log-config.yaml:ro
    depends_on:
      litellm-postgres: { condition: service_healthy }
      gateway-fixture: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=2)"]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 20s
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

  workspace-controller:
    build:
      context: ../..
      dockerfile: infra/issue-001/Dockerfile.node
    command: ["npm", "run", "start", "-w", "@onecomputer/workspace-controller"]
    environment:
      CONTROLLER_HOST: 0.0.0.0
      CONTROLLER_PORT: 4101
      CONTROLLER_INTERNAL_TOKEN: ${ONECOMPUTER_CONTROLLER_TOKEN:?set ONECOMPUTER_CONTROLLER_TOKEN}
      SANDBOX_DRIVER: kasm-local
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      KASM_LOCAL_NETWORK_PREFIX: onecomputer-v4-ws
      KASM_LOCAL_CONTROL_NETWORK: onecomputer-v4-control
      KASM_LOCAL_GATEWAY_CONTAINER: onecomputer-v4-litellm
      KASM_LOCAL_IMAGE: ${ONECOMPUTER_WORKSPACE_IMAGE:?build infra/issue-006 and set ONECOMPUTER_WORKSPACE_IMAGE to its sha256 image id}
      KASM_LOCAL_RELAY_IMAGE: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
      KASM_PUBLIC_HOST: 127.0.0.1
    networks: [control-private]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

  control-api:
    build:
      context: ../..
      dockerfile: infra/issue-001/Dockerfile.node
    command: ["npm", "run", "start", "-w", "@onecomputer/control-api"]
    environment:
      CONTROL_HOST: 0.0.0.0
      CONTROL_PORT: 4100
      WEB_PROXY_TOKEN: ${ONECOMPUTER_WEB_PROXY_TOKEN:?set ONECOMPUTER_WEB_PROXY_TOKEN}
      CONTROLLER_URL: http://workspace-controller:4101
      CONTROLLER_INTERNAL_TOKEN: ${ONECOMPUTER_CONTROLLER_TOKEN:?set ONECOMPUTER_CONTROLLER_TOKEN}
      DATABASE_URL: postgres://onecomputer:${ONECOMPUTER_POSTGRES_PASSWORD}@postgres:5432/onecomputer
      LITELLM_ADMIN_URL: http://litellm:4000
      LITELLM_WORKSPACE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${ONECOMPUTER_LITELLM_MASTER_KEY:?set ONECOMPUTER_LITELLM_MASTER_KEY}
      LITELLM_CREDENTIAL_SECRET: ${ONECOMPUTER_LITELLM_CREDENTIAL_SECRET:?set ONECOMPUTER_LITELLM_CREDENTIAL_SECRET}
      FIXTURE_APPROVAL_SECRET: ${ONECOMPUTER_FIXTURE_APPROVAL_SECRET:?set ONECOMPUTER_FIXTURE_APPROVAL_SECRET}
      PUBLIC_WEB_URL: ${ONECOMPUTER_PUBLIC_WEB_URL:-http://localhost:4174}
      M365_AUTHORIZATION_ORIGIN: ${ONECOMPUTER_M365_AUTHORIZATION_ORIGIN:-http://localhost:3001}
      ENTRA_TENANT_ID: ${ONECOMPUTER_ENTRA_TENANT_ID:-${ONECOMPUTER_MS365_TENANT_ID:?set ONECOMPUTER_ENTRA_TENANT_ID}}
      ENTRA_CLIENT_ID: ${ONECOMPUTER_ENTRA_CLIENT_ID:-${ONECOMPUTER_MS365_CLIENT_ID:?set ONECOMPUTER_ENTRA_CLIENT_ID}}
      ENTRA_CLIENT_SECRET: ${ONECOMPUTER_ENTRA_CLIENT_SECRET:-${ONECOMPUTER_MS365_CLIENT_SECRET:?set ONECOMPUTER_ENTRA_CLIENT_SECRET}}
      SESSION_SECRET: ${ONECOMPUTER_SESSION_SECRET:-${ONECOMPUTER_LITELLM_CREDENTIAL_SECRET:?set ONECOMPUTER_SESSION_SECRET}}
      BOOTSTRAP_TENANT_ID: ${ONECOMPUTER_BOOTSTRAP_TENANT_ID:-acme}
      BOOTSTRAP_USER_ID: ${ONECOMPUTER_BOOTSTRAP_USER_ID:-alex-morgan}
      TENANT_DISPLAY_NAME: ${ONECOMPUTER_TENANT_DISPLAY_NAME:-ME TECH}
      ADMINISTRATOR_EMAILS: ${ONECOMPUTER_ADMINISTRATOR_EMAILS:-mike@metech.dev}
    networks: [web-edge, control-private, gateway-private]
    depends_on:
      postgres: { condition: service_healthy }
      workspace-controller: { condition: service_started }
      litellm: { condition: service_healthy }
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: infra/issue-001/Dockerfile.node
    command: ["npm", "run", "dev", "-w", "web", "--", "--host", "0.0.0.0", "--port", "4173", "--configLoader", "native"]
    environment:
      ONECOMPUTER_CONTROL_URL: http://control-api:4100
      ONECOMPUTER_WEB_PROXY_TOKEN: ${ONECOMPUTER_WEB_PROXY_TOKEN:?set ONECOMPUTER_WEB_PROXY_TOKEN}
      VITE_LITELLM_ADMIN_URL: http://127.0.0.1:4000/ui
      ONECOMPUTER_VITE_CACHE_DIR: /tmp/vite
    networks: [web-edge]
    ports: ["127.0.0.1:4174:4173"]
    depends_on: [control-api]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    restart: unless-stopped

networks:
  web-edge: {}
  control-private:
    name: onecomputer-v4-control
  gateway-private:
    internal: true
volumes:
  onecomputer-v4-postgres-data:
    name: onecomputer-v4-postgres-data
    external: true
  onecomputer-v4-litellm-postgres-data:
    name: onecomputer-v4-litellm-postgres-data
