model_list:
  - model_name: onecomputer-assistant
    litellm_params:
      model: openai/onecomputer-fixture
      api_base: http://gateway-fixture:4200/v1
      api_key: fixture-model-key-not-a-provider-secret

mcp_servers:
  onecomputer_fixture:
    transport: http
    url: http://gateway-fixture:4200/mcp
    description: ONEComputer Issue 002 read and destructive tool fixture

  # Qualification-only server for proving per-user OAuth custody and isolation
  # without placing real Microsoft tokens in a synthetic negative test.
  onecomputer_oauth_fixture:
    transport: http
    url: http://gateway-fixture:4200/oauth-mcp
    description: ONEComputer per-user OAuth isolation fixture
    auth_type: oauth2
    oauth2_flow: authorization_code
    client_id: onecomputer-oauth-fixture
    authorization_url: http://gateway-fixture:4200/oauth/authorize
    token_url: http://gateway-fixture:4200/oauth/token
    scopes:
      - fixture.read
    allowed_tools:
      - credential_identity
      - credential_secondary
    allow_all_keys: false
    available_on_public_internet: false
    delegate_auth_to_upstream: false

  onecomputer_ms365:
    transport: http
    url: http://ms365-mcp:3000/mcp
    description: Pinned Softeria Microsoft 365 connector for Outlook Mail, Calendar, and OneDrive
    auth_type: oauth2
    oauth2_flow: authorization_code
    client_id: onecomputer-litellm
    # Browser-facing local-development route. Token exchange stays private.
    authorization_url: http://localhost:3001/authorize
    token_url: http://ms365-mcp:3000/token
    scopes:
      - User.Read
      - Mail.Read
      - Calendars.Read
      - Files.Read
    allowed_tools:
      - get-calendar-event
      - get-calendar-view
      - get-drive-delta
      - get-drive-item
      - get-drive-root-item
      - get-mail-message
      - get-mail-message-mime
      - get-mail-tips
      - get-schedule
      - get-specific-calendar-event
      - get-specific-calendar-view
      - list-calendar-event-instances
      - list-calendar-events
      - list-calendar-events-delta
      - list-calendar-view-delta
      - list-calendars
      - list-drive-item-permissions
      - list-drive-item-thumbnails
      - list-drive-item-versions
      - list-drives
      - list-focused-inbox-overrides
      - list-folder-files
      - list-mail-attachments
      - list-mail-child-folders
      - list-mail-folder-messages
      - list-mail-folder-messages-delta
      - list-mail-folders
      - list-mail-messages
      - list-my-calendar-permissions
      - list-specific-calendar-events
      - list-supported-languages
      - list-supported-time-zones
      - search-onedrive-files
    allow_all_keys: false
    available_on_public_internet: false
    delegate_auth_to_upstream: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Required for the local Chat UI settings used by per-user MCP OAuth.
  store_model_in_db: true

litellm_settings:
  drop_params: true
  set_verbose: false
